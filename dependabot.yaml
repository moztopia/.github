version: 2
updates:
  # Node.js / npm (React, Next.js)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python / pip (safe: only bumps requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Example: skip pip itself to avoid Ubuntu conflicts
      - dependency-name: "pip"

  # PHP / Composer (Laravel)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"

  # Rust / Cargo
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dart / pub
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
