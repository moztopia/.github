---
name: Git Merge Prefixes
description: "Sequentially merges all remote branches matching specified prefixes into a new integration branch."
inputs:
  prefixes:
    description: "Pipe-separated list of branch prefixes to merge (e.g., 'feat|fix'). Defaults to $PREFIXES env var."
    required: false
  target_branch_prefix:
    description: "Prefix for the final consolidated branch."
    required: false
    default: "nightly"

outputs:
  date:
    description: "The date string used for the branch name (YYYYMMDD)"
    value: ${{ steps.merge.outputs.date }}
  branch_name:
    description: "The final name of the merged branch"
    value: ${{ steps.merge.outputs.branch_name }}

runs:
  using: "composite"
  steps:
    - name: Merge Branches
      id: merge
      shell: bash
      run: |
        python3 "${{ github.action_path }}/git_merge_prefixes.py" \
          --prefixes "${{ inputs.prefixes }}" \
          --target-branch-prefix "${{ inputs.target_branch_prefix }}" \
          --prefixes-env "$PREFIXES"
