inputs:
  head:
    description: "Branch containing changes (defaults to $MERGED_BRANCH)"
    required: false
  base:
    description: "Branch to merge into (defaults to config or develop)"
    required: false
  title:
    description: "PR title"
    required: false
  body:
    description: "PR body"
    required: false
  reviewer:
    description: "Reviewer to assign"
    required: false

runs:
  using: "composite"
  steps:
    - name: Create or Update PR
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        python3 "${{ github.action_path }}/create_pr.py" \
          --head "${{ inputs.head }}" \
          --base "${{ inputs.base }}" \
          --title "${{ inputs.title }}" \
          --body "${{ inputs.body }}" \
          --reviewer "${{ inputs.reviewer }}"
