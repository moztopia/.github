name: "Bump Versions"
description: "Increment patch and append build date across multiple project files"

runs:
  using: "composite"
  steps:
    - name: Load versioning config
      id: config
      shell: bash
      run: |
        FILES=$(yq -r '.versioning.files[]?' github_configuration.yaml)
        echo "files=$FILES" >> $GITHUB_OUTPUT

    - name: Bump versions
      shell: bash
      run: |
        DATE=$(date +%Y%m%d)
        for FILE in ${{ steps.config.outputs.files }}; do
          echo "Processing $FILE..."
          case "$FILE" in
            *.json)
              VERSION=$(jq -r '.version' "$FILE")
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              PATCH=$((PATCH+1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH-$DATE"
              jq ".version = \"$NEW_VERSION\"" "$FILE" > tmp && mv tmp "$FILE"
              ;;
            *.toml)
              VERSION=$(grep '^version' "$FILE" | cut -d'"' -f2)
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              PATCH=$((PATCH+1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH-$DATE"
              sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" "$FILE"
              ;;
            *)
              echo "Skipping unsupported file type: $FILE"
              ;;
          esac
        done

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git commit -am "Bump versions for nightly build"
