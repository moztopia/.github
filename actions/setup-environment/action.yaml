---
name: Setup Environment
description: "Loads configuration, configures git identity, and optionally switches branches."

inputs:
  switch_branch:
    description: "Whether to switch to the target branch"
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Load Configuration
      id: config
      shell: bash
      run: |
        python3 "${{ github.action_path }}/setup_env.py" --event-name "${{ github.event_name }}"

    - name: Configure Git
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # Setup gh auth for git operations if GH_TOKEN is present
        if [ -n "$GH_TOKEN" ]; then
          gh auth setup-git
        fi

    - name: Fetch and Switch to Target Branch
      if: ${{ inputs.switch_branch == 'true' }}
      shell: bash
      run: |
        git fetch --all
        git checkout "$TARGET_BRANCH"
