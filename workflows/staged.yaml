---
name: Staged Integration
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        shell: bash
        run: |
          if [ -f .github/configuration.json ]; then
            ENABLED=$(jq -r '.integration.enabled | if . == null then true else . end' .github/configuration.json)
            echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

  integration:
    needs: check-gate
    if: needs.check-gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine Staged Branch
        id: branch-finder
        shell: bash
        run: |
          git fetch --all

          CONFIG_FILE=".github/configuration.json"
          if [ -f "$CONFIG_FILE" ]; then
            PREFIX=$(jq -r '.integration.output_branch_prefix // "nightly"' "$CONFIG_FILE")
          else
            PREFIX="nightly"
          fi

          echo "Searching for branches with prefix: $PREFIX"

          # 1: {prefix} branch
          BRANCH=$(git branch -r | grep -E "origin/$PREFIX$" | sed 's|.*origin/||' | xargs || true)

          # 2: {prefix}/{build_date} (the most recent of these if {prefix} alone does not exist)
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch -r | grep -E "origin/$PREFIX/[0-9]+$" | sed 's|.*origin/||' | sort -V | tail -n 1 | xargs || true)
          fi

          # 3: abort the process
          if [ -z "$BRANCH" ]; then
            echo "::error::Neither '$PREFIX' nor '$PREFIX/{build_date}' branch found. Aborting."
            exit 1
          fi

          echo "Found branch: $BRANCH"
          echo "TARGET_BRANCH=$BRANCH" >> $GITHUB_ENV

          # Update the configuration in-place so Setup Environment uses it
          CONFIG_FILE=".github/configuration.json"
          if [ -f "$CONFIG_FILE" ]; then
            jq --arg br "$BRANCH" '.integration.target_branch = $br' "$CONFIG_FILE" > tmp.json && mv tmp.json "$CONFIG_FILE"
            echo "Updated $CONFIG_FILE with target_branch=$BRANCH"
          fi

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Sequential merge
        uses: ./.github/actions/git-merge-prefixes

      - name: Load Code Check Config
        shell: bash
        run: |
          CONFIG_FILE=".github/configuration.json"
          jq -r '.code_checks | to_entries | .[] | "CHECK_\(.key | ascii_upcase)=\(.value.enabled | if . == null then true else . end)"' "$CONFIG_FILE" >> $GITHUB_ENV

      - name: Code Validation
        uses: ./.github/actions/code-validation
        with:
          check_node: ${{ env.CHECK_NODE }}
          check_python: ${{ env.CHECK_PYTHON }}
          check_laravel: ${{ env.CHECK_LARAVEL }}
          check_rust: ${{ env.CHECK_RUST }}
          check_dart: ${{ env.CHECK_DART }}
          check_makefile: ${{ env.CHECK_MAKEFILE }}
          check_bash: ${{ env.CHECK_BASH }}
          check_markdown: ${{ env.CHECK_MARKDOWN }}
          check_config: ${{ env.CHECK_CONFIG }}

      - name: Push integration branch
        shell: bash
        run: |
          git push origin --delete "$MERGED_BRANCH" || true
          git push origin "$MERGED_BRANCH"
