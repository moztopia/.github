---
name: Staged Integration
on:
  workflow_dispatch:

jobs:
  check-gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        uses: ./.github/actions/check-gate

  integration:
    needs: check-gate
    if: needs.check-gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine Staged Branch
        id: branch-finder
        shell: bash
        run: |
          git fetch --all

          CONFIG_FILE=".github/configuration.json"
          if [ -f "$CONFIG_FILE" ]; then
            PREFIX=$(jq -r '.integration.output_branch_prefix // "nightly"' "$CONFIG_FILE")
          else
            PREFIX="nightly"
          fi

          echo "Searching for branches with prefix: $PREFIX"

          # 1: {prefix} branch
          BRANCH=$(git branch -r | grep -E "origin/$PREFIX$" | sed 's|.*origin/||' | xargs || true)

          # 2: {prefix}/{build_date} (the most recent of these if {prefix} alone does not exist)
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch -r | grep -E "origin/$PREFIX/[0-9]+$" | sed 's|.*origin/||' | sort -V | tail -n 1 | xargs || true)
          fi

          # 3: abort the process
          if [ -z "$BRANCH" ]; then
            echo "::error::Neither '$PREFIX' nor '$PREFIX/{build_date}' branch found. Aborting."
            exit 1
          fi

          echo "Found branch: $BRANCH"
          echo "TARGET_BRANCH=$BRANCH" >> $GITHUB_ENV

          # Update the configuration in-place so Setup Environment uses it
          CONFIG_FILE=".github/configuration.json"
          if [ -f "$CONFIG_FILE" ]; then
            jq --arg br "$BRANCH" '.integration.target_branch = $br' "$CONFIG_FILE" > tmp.json && mv tmp.json "$CONFIG_FILE"
            echo "Updated $CONFIG_FILE with target_branch=$BRANCH"
          fi

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sequential merge
        uses: ./.github/actions/git-merge-prefixes

      - name: Code Validation
        uses: ./.github/actions/code-validation

      - name: Push integration branch
        shell: bash
        run: |
          git push origin --delete "$MERGED_BRANCH" || true
          git push origin "$MERGED_BRANCH"

      - name: Create Pull Request
        uses: ./.github/actions/create-pull-request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
